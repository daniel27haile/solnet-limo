# ============================================================
# Nginx — Solnet Limo
# Frontend : solnetlimo.com  → /var/www/solnet-limo/solnet-limo-client
# API      : api.solnetlimo.com → http://localhost:3001
#
# IMPORTANT BEFORE USING:
#   1. Run Certbot first to obtain SSL certs:
#      sudo certbot --nginx -d solnetlimo.com -d www.solnetlimo.com
#      sudo certbot --nginx -d api.solnetlimo.com
#   2. Then copy this file:
#      sudo cp nginx/solnet-limo.conf /etc/nginx/sites-available/solnet-limo
#      sudo ln -sf /etc/nginx/sites-available/solnet-limo \
#                  /etc/nginx/sites-enabled/solnet-limo
#   3. Test and reload:
#      sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ── Gzip compression (add to http{} block in nginx.conf if not already set) ──
# These directives work here too but are most effective in the http block.
gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   6;
gzip_buffers      16 8k;
gzip_http_version 1.1;
gzip_min_length   256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff
    font/woff2
    application/font-woff
    application/font-woff2;

# ── Redirect HTTP → HTTPS (frontend) ────────────────────────
server {
    listen 80;
    server_name solnetlimo.com www.solnetlimo.com;
    return 301 https://solnetlimo.com$request_uri;
}

# ── Redirect HTTP → HTTPS (API) ─────────────────────────────
server {
    listen 80;
    server_name api.solnetlimo.com;
    return 301 https://api.solnetlimo.com$request_uri;
}

# ── Frontend (Angular SPA) ───────────────────────────────────
server {
    listen 443 ssl;
    server_name solnetlimo.com www.solnetlimo.com;

    # SSL — managed by Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/solnetlimo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solnetlimo.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/solnet-limo/solnet-limo-client;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # index.html — must never be cached so users always get the latest build
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # robots.txt and sitemap — short cache
    location ~* \.(txt|xml)$ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Cache long-term: Angular uses content-hashed filenames for JS/CSS/assets.
    # WebP and AVIF included for hashed fleet/hero images.
    location ~* \.(js|css|ico|svg|woff|woff2|ttf|eot|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Angular SPA — THIS LINE FIXES THE REFRESH BLACK SCREEN.
    # For any URL that doesn't match a real file (e.g. /admin/dashboard),
    # serve index.html so the Angular router handles routing client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── API (Node.js / Express via PM2) ─────────────────────────
server {
    listen 443 ssl;
    server_name api.solnetlimo.com;

    # SSL — managed by Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/api.solnetlimo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.solnetlimo.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
